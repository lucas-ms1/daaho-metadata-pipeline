<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOC15 Metadata Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .search-bar {
            background: white;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        .search-bar input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #667eea;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 2rem;
        }

        .item-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .item-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }

        .image-container {
            width: 100%;
            height: 300px;
            background: #f7fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 3px solid #667eea;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .image-container.no-image {
            color: #a0aec0;
            font-size: 1rem;
        }

        .metadata-content {
            padding: 1.5rem;
        }

        .item-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .item-generated-title {
            font-size: 0.9rem;
            color: #667eea;
            margin-bottom: 1rem;
            font-style: italic;
        }

        .metadata-field {
            margin-bottom: 0.75rem;
        }

        .field-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .field-value {
            color: #2d3748;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .field-value.null {
            color: #cbd5e0;
            font-style: italic;
        }

        .field-value.array {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            background: #edf2f7;
            color: #4a5568;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .accordion {
            margin-top: 1rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 1rem;
        }

        .accordion-item {
            margin-bottom: 0.5rem;
        }

        .accordion-header {
            background: #f7fafc;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .accordion-header:hover {
            background: #edf2f7;
        }

        .accordion-header .label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.9rem;
        }

        .accordion-header .icon {
            font-size: 1.2rem;
            color: #a0aec0;
            transition: transform 0.3s;
        }

        .accordion-header.active .icon {
            transform: rotate(180deg);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .accordion-content.active {
            max-height: 500px;
            overflow-y: auto;
        }

        .accordion-content-inner {
            padding: 1rem;
            background: #fafafa;
            border-radius: 0 0 8px 8px;
            margin-top: 0.25rem;
        }

        .accordion-content pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #2d3748;
            font-family: 'Monaco', 'Menlo', monospace;
        }

        .context-badge {
            display: inline-block;
            background: #764ba2;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        .tier-section {
            margin-top: 1rem;
            border-top: 1px dashed #e2e8f0;
            padding-top: 0.75rem;
        }

        .tier-header {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2d3748;
            margin-bottom: 0.5rem;
        }

        .provenance {
            display: inline-block;
            background: #f1f5f9;
            color: #475569;
            padding: 0.15rem 0.5rem;
            border-radius: 6px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }

        .review-form {
            margin-top: 1rem;
            padding: 0.75rem;
            background: #f8fafc;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .review-form label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #4a5568;
            display: block;
            margin-top: 0.5rem;
        }

        .review-form input,
        .review-form textarea,
        .review-form select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .review-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .review-actions button {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .review-status {
            font-size: 0.75rem;
            color: #4a5568;
            margin-top: 0.5rem;
        }

        .vocab-warnings {
            margin-top: 1rem;
            padding: 0.75rem;
            background: #fff7ed;
            border: 1px solid #fed7aa;
            border-radius: 10px;
            color: #7c2d12;
            font-size: 0.85rem;
        }

        .vocab-warning {
            margin-top: 0.5rem;
        }

        .vocab-warning-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .vocab-warning-item {
            margin-top: 0.25rem;
        }

        .vocab-warning-item span {
            display: block;
        }

        .vocab-suggestions {
            color: #9a3412;
            font-size: 0.8rem;
        }

        .autocomplete-menu {
            position: absolute;
            z-index: 9999;
            background: white;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.12);
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .autocomplete-item {
            padding: 0.4rem 0.6rem;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .autocomplete-item:hover {
            background: #f1f5f9;
        }

        .autocomplete-loading {
            color: #64748b;
            cursor: default;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            padding: 3rem;
        }

        .no-results {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 3rem;
        }

        @media (max-width: 768px) {
            .items-grid {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🖼️ LOC15 Metadata Viewer</h1>
            <p>Browse your digitized collection with extracted metadata</p>
        </header>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Search by title, creator, subjects, description...">
        </div>

        <div id="loading" class="loading">Loading items...</div>
        <div id="itemsContainer" class="items-grid" style="display: none;"></div>
        <div id="noResults" class="no-results" style="display: none;">No items found matching your search.</div>
    </div>

    <script>
        let allItems = [];

        // Fetch items on page load
        async function loadItems() {
            try {
                const response = await fetch('/api/items');
                allItems = await response.json();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('itemsContainer').style.display = 'grid';
                renderItems(allItems);
            } catch (error) {
                console.error('Error loading items:', error);
                document.getElementById('loading').innerHTML = '❌ Error loading items';
            }
        }

        // Render items to the DOM
        function renderItems(items) {
            const container = document.getElementById('itemsContainer');
            const noResults = document.getElementById('noResults');
            
            if (items.length === 0) {
                container.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }
            
            container.style.display = 'grid';
            noResults.style.display = 'none';
            container.innerHTML = '';

            items.forEach(item => {
                const card = createItemCard(item);
                container.appendChild(card);
            });
        }

        function isEmptyValue(value) {
            if (value === null || value === undefined || value === '') return true;
            if (Array.isArray(value) && value.length === 0) return true;
            return false;
        }

        function formatArray(value) {
            if (!value || value.length === 0) return '';
            return value.map(v => `<span class="tag">${v}</span>`).join('');
        }

        function formatScalar(value) {
            if (typeof value === 'boolean') return value ? 'Yes' : 'No';
            return String(value);
        }

        function buildField(field, value, provenance) {
            if (isEmptyValue(value)) return '';
            const provLabel = provenance && provenance[field] ? `<span class="provenance">${provenance[field]}</span>` : '';
            const displayValue = Array.isArray(value)
                ? `<div class="field-value array">${formatArray(value)}</div>`
                : `<div class="field-value">${formatScalar(value)}</div>`;
            return `
                <div class="metadata-field">
                    <div class="field-label">${field}${provLabel}</div>
                    ${displayValue}
                </div>
            `;
        }

        function buildTierSection(title, fields, data, provenance) {
            const blocks = fields.map(field => buildField(field, data[field], provenance)).filter(Boolean).join('');
            if (!blocks) return '';
            return `
                <div class="tier-section">
                    <div class="tier-header">${title}</div>
                    ${blocks}
                </div>
            `;
        }

        function buildVocabWarnings(validation) {
            if (!validation) return '';
            const sections = [];
            const buildSection = (label, items) => {
                const invalid = (items || []).filter(item => item && item.valid === false && item.term);
                if (!invalid.length) return '';
                const rows = invalid.map(item => {
                    const suggestions = (item.suggestions || []).slice(0, 5).join('; ');
                    const error = item.error ? `<span class="vocab-suggestions">Error: ${item.error}</span>` : '';
                    const suggestionHtml = suggestions ? `<span class="vocab-suggestions">Suggestions: ${suggestions}</span>` : '';
                    return `
                        <div class="vocab-warning-item">
                            <span>${item.term}</span>
                            ${suggestionHtml}
                            ${error}
                        </div>
                    `;
                }).join('');
                return `
                    <div class="vocab-warning">
                        <div class="vocab-warning-title">${label}</div>
                        ${rows}
                    </div>
                `;
            };

            const subjectSection = buildSection('Subjects (FAST) needing review', validation.subjects);
            const genreSection = buildSection('Genre (AAT) needing review', validation.genre);
            if (subjectSection) sections.push(subjectSection);
            if (genreSection) sections.push(genreSection);
            if (!sections.length) return '';
            return `<div class="vocab-warnings">${sections.join('')}</div>`;
        }

        // Create a card for an item
        function createItemCard(item) {
            const card = document.createElement('div');
            card.className = 'item-card';

            const metadata = item.metadata || {};
            const tiers = item.metadata_tiers || {};
            const provenance = item.field_provenance || {};
            const tier1 = tiers.tier1 || metadata;
            const tier2 = tiers.tier2 || {};
            const tier3 = tiers.tier3 || {};
            const review = item.review || {};
            const reviewOverrides = review.overrides || {};
            const context = item.context || {};
            const normalizedTitle = (context.title_derivation && context.title_derivation.normalized_title) || metadata.title;

            // Image section
            const imageHtml = item.image 
                ? `<img src="${item.image}" alt="${item.filename}" loading="lazy">`
                : '<div class="no-image">📄 No image available</div>';

            const tier1Fields = ['title', 'generated_title', 'description', 'date', 'place', 'language', 'contributors', 'correspondents', 'keywords', 'decade'];
            const tier2Fields = ['subjects', 'theme', 'genre', 'creator', 'publisher'];
            const tier3Fields = ['repository', 'collection', 'series', 'folder', 'box', 'identifier', 'call_number', 'digital_identifier', 'reproduction_number', 'permalink', 'digital_collection', 'digital_publisher', 'digitized', 'rights'];

            // Accordion sections for long text fields
            const transcriptHtml = metadata.transcript ? `
                <div class="accordion-item">
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <span class="label">📝 Transcript</span>
                        <span class="icon">▼</span>
                    </div>
                    <div class="accordion-content">
                        <div class="accordion-content-inner">
                            <pre>${metadata.transcript}</pre>
                        </div>
                    </div>
                </div>
            ` : '';

            const textReadingHtml = metadata.text_reading ? `
                <div class="accordion-item">
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <span class="label">📖 Text Reading</span>
                        <span class="icon">▼</span>
                    </div>
                    <div class="accordion-content">
                        <div class="accordion-content-inner">
                            <pre>${metadata.text_reading}</pre>
                        </div>
                    </div>
                </div>
            ` : '';

            const tier1Display = Object.assign({}, tier1, { title: normalizedTitle || tier1.title });
            const tier1Section = buildTierSection('Tier 1 (AI-generated)', tier1Fields, tier1Display, provenance);
            const tier2Section = buildTierSection('Tier 2 (AI-proposed)', tier2Fields, tier2, provenance);
            const tier3Section = buildTierSection('Tier 3 (Human-only defaults)', tier3Fields, tier3, provenance);
            const vocabWarningsHtml = buildVocabWarnings(context.vocabulary_validation);

            // Context info
            const contextHtml = `
                <span class="context-badge">Model: ${context.model || 'unknown'}</span>
                <span class="context-badge">Confidence: ${Math.round(context.processing_confidence || 0)}%</span>
            `;

            const reviewStatus = review.status ? `Status: ${review.status}` : 'Status: not reviewed';
            const reviewMeta = review.reviewer ? `${reviewStatus} · Reviewer: ${review.reviewer}` : reviewStatus;

            const reviewFormHtml = `
                <div class="review-form">
                    <div class="tier-header">Archivist Review (Tier 2)</div>
                    <label>Reviewer</label>
                    <input type="text" class="reviewer" value="${review.reviewer || ''}" placeholder="Initials or name">
                    <label>Status</label>
                    <select class="status">
                        <option value="">Not reviewed</option>
                        <option value="needs_work" ${review.status === 'needs_work' ? 'selected' : ''}>Needs work</option>
                        <option value="in_review" ${review.status === 'in_review' ? 'selected' : ''}>In review</option>
                        <option value="approved" ${review.status === 'approved' ? 'selected' : ''}>Approved</option>
                    </select>
                    <label>Subjects (semicolon separated)</label>
                    <input type="text" class="subjects" value="${(reviewOverrides.subjects || metadata.subjects || []).join('; ')}">
                    <label>Theme (semicolon separated)</label>
                    <input type="text" class="theme" value="${(reviewOverrides.theme || metadata.theme || []).join('; ')}">
                    <label>Genre (semicolon separated)</label>
                    <input type="text" class="genre" value="${(reviewOverrides.genre || metadata.genre || []).join('; ')}">
                    <label>Creator</label>
                    <input type="text" class="creator" value="${reviewOverrides.creator || metadata.creator || ''}">
                    <label>Publisher</label>
                    <input type="text" class="publisher" value="${reviewOverrides.publisher || metadata.publisher || ''}">
                    <label>Notes</label>
                    <textarea rows="3" class="notes" placeholder="Optional review notes">${review.notes || ''}</textarea>
                    <div class="review-actions">
                        <button onclick="saveReview('${item.id}', this)">Save review</button>
                    </div>
                    <div class="review-status">${reviewMeta}</div>
                </div>
            `;

            card.innerHTML = `
                <div class="image-container ${!item.image ? 'no-image' : ''}">
                    ${imageHtml}
                </div>
                <div class="metadata-content">
                    <div class="item-title">${normalizedTitle || item.filename}</div>
                    ${metadata.generated_title ? `<div class="item-generated-title">${metadata.generated_title}</div>` : ''}
                    ${tier1Section}
                    ${tier2Section}
                    ${tier3Section}
                    ${transcriptHtml || textReadingHtml ? '<div class="accordion">' + transcriptHtml + textReadingHtml + '</div>' : ''}
                    ${vocabWarningsHtml}
                    ${reviewFormHtml}
                    <div style="margin-top: 1rem;">
                        ${contextHtml}
                    </div>
                </div>
            `;

            initAutocomplete(card);

            return card;
        }

        function initAutocomplete(card) {
            const subjectsInput = card.querySelector('.review-form .subjects');
            const genreInput = card.querySelector('.review-form .genre');
            if (subjectsInput) {
                attachAutocomplete(subjectsInput, '/api/vocab/fast/search');
            }
            if (genreInput) {
                attachAutocomplete(genreInput, '/api/vocab/aat/search');
            }
        }

        function attachAutocomplete(inputEl, endpoint) {
            const menu = document.createElement('div');
            menu.className = 'autocomplete-menu';
            document.body.appendChild(menu);

            let debounceTimer = null;
            let active = false;

            const positionMenu = () => {
                const rect = inputEl.getBoundingClientRect();
                menu.style.width = `${rect.width}px`;
                menu.style.left = `${rect.left + window.scrollX}px`;
                menu.style.top = `${rect.bottom + window.scrollY}px`;
            };

            const hideMenu = () => {
                menu.style.display = 'none';
                active = false;
            };

            const showMenu = () => {
                if (!menu.innerHTML.trim()) {
                    hideMenu();
                    return;
                }
                positionMenu();
                menu.style.display = 'block';
                active = true;
            };

            const updateValue = (value) => {
                const parts = inputEl.value.split(';');
                if (parts.length === 1) {
                    inputEl.value = value;
                    return;
                }
                parts[parts.length - 1] = ` ${value}`;
                inputEl.value = parts.map(part => part.trim()).filter(Boolean).join('; ');
            };

            const fetchSuggestions = (query) => {
                if (!query) {
                    hideMenu();
                    return;
                }
                menu.innerHTML = '<div class="autocomplete-item autocomplete-loading">Loading...</div>';
                showMenu();
                fetch(`${endpoint}?q=${encodeURIComponent(query)}`)
                    .then(resp => resp.json())
                    .then(data => {
                        const suggestions = data.suggestions || [];
                        if (!suggestions.length) {
                            hideMenu();
                            return;
                        }
                        menu.innerHTML = suggestions
                            .map(item => `<div class="autocomplete-item" data-value="${item.term}">${item.term}</div>`)
                            .join('');
                        showMenu();
                    })
                    .catch(() => hideMenu());
            };

            inputEl.addEventListener('input', (event) => {
                const value = event.target.value || '';
                const parts = value.split(';');
                const current = parts[parts.length - 1].trim();
                if (debounceTimer) {
                    clearTimeout(debounceTimer);
                }
                debounceTimer = setTimeout(() => fetchSuggestions(current), 250);
            });

            inputEl.addEventListener('focus', () => {
                if (active) {
                    showMenu();
                }
            });

            menu.addEventListener('click', (event) => {
                const target = event.target;
                if (!target || !target.dataset || !target.dataset.value) {
                    return;
                }
                updateValue(target.dataset.value);
                hideMenu();
                inputEl.focus();
            });

            document.addEventListener('click', (event) => {
                if (event.target === inputEl || menu.contains(event.target)) {
                    return;
                }
                hideMenu();
            });

            window.addEventListener('resize', () => {
                if (active) {
                    positionMenu();
                }
            });
        }

        // Toggle accordion
        function toggleAccordion(header) {
            const content = header.nextElementSibling;
            const isActive = header.classList.contains('active');

            // Close all accordions in this card
            const card = header.closest('.item-card');
            card.querySelectorAll('.accordion-header').forEach(h => h.classList.remove('active'));
            card.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('active'));

            // Open this one if it wasn't active
            if (!isActive) {
                header.classList.add('active');
                content.classList.add('active');
            }
        }

        async function saveReview(itemId, buttonEl) {
            const form = buttonEl.closest('.review-form');
            const payload = {
                reviewer: form.querySelector('.reviewer').value.trim(),
                status: form.querySelector('.status').value,
                notes: form.querySelector('.notes').value.trim(),
                overrides: {
                    subjects: form.querySelector('.subjects').value,
                    theme: form.querySelector('.theme').value,
                    genre: form.querySelector('.genre').value,
                    creator: form.querySelector('.creator').value,
                    publisher: form.querySelector('.publisher').value
                }
            };
            try {
                const resp = await fetch(`/api/review/${itemId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!resp.ok) {
                    alert('Failed to save review.');
                    return;
                }
                const result = await resp.json();
                const review = result.review || {};
                const status = review.status ? `Status: ${review.status}` : 'Status: not reviewed';
                const meta = review.reviewer ? `${status} · Reviewer: ${review.reviewer}` : status;
                form.querySelector('.review-status').textContent = meta;
            } catch (error) {
                alert('Error saving review.');
            }
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            
            if (!query) {
                renderItems(allItems);
                return;
            }

            const filtered = allItems.filter(item => {
                const metadata = item.metadata;
                const searchableText = [
                    item.filename,
                    metadata.title,
                    metadata.generated_title,
                    metadata.creator,
                    metadata.description,
                    metadata.collection,
                    ...(metadata.subjects || []),
                    ...(metadata.theme || []),
                    ...(metadata.genre || [])
                ].filter(Boolean).join(' ').toLowerCase();

                return searchableText.includes(query);
            });

            renderItems(filtered);
        });

        // Load items when page loads
        loadItems();
    </script>
</body>
</html>
